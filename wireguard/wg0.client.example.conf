# Example WireGuard client config for the Jetson. COPY to wg0.conf and fill in.
# Real *.conf files are gitignored — never commit private keys.

[Interface]
# Jetson's private key (generate on-device: wg genkey)
PrivateKey = <JETSON_PRIVATE_KEY>
Address = 10.0.0.2/24
DNS = 10.0.0.1

[Peer]
# VPS WireGuard server
PublicKey = <VPS_SERVER_PUBLIC_KEY>
Endpoint = vps.example.com:51820
AllowedIPs = 10.0.0.0/24
# Keep the outbound tunnel alive behind home NAT (no inbound port needed)
PersistentKeepalive = 25
