  #   image: ghcr.io/openclaw/openclaw:${OPENCLAW_VERSION}
  #   restart: unless-stopped
  #   volumes:
  #     - ../config/openclaw:/config
  #     - ./data/openclaw:/root/.openclaw
  #   env_file: ../.env
